<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Nerdlandia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺</text></svg>" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="../index.html" class="nav-logo">🗺 Nerdlandia</a>
      <ul class="nav-links">
        <li><a href="events.html">Events</a></li>
        <li><a href="teams.html">Teams</a></li>
        <li><a href="achievements.html">Achievements</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
      </ul>
      <div class="nav-actions">
        <a href="register.html" class="btn btn-primary">Create Account</a>
      </div>
      <button class="nav-toggle" aria-label="Open menu" onclick="toggleNav()">☰</button>
    </nav>
    <div class="nav-mobile" id="navMobile">
      <a href="events.html">Events</a>
      <a href="register.html" class="btn btn-primary" style="text-align:center;">Create Account</a>
    </div>
  </header>

  <main>
    <section class="section auth-section">
      <div class="container">
        <div class="form-wrap">
          <div class="form-emoji">🔐</div>
          <h1 class="form-title">Welcome back!</h1>
          <div id="formError" class="form-msg error" style="display:none;"></div>
          <form id="loginForm" novalidate>
            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label for="password">
                Password
                <a href="forgot-password.html" class="label-link">Forgot?</a>
              </label>
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            </div>
            <button type="submit" class="btn btn-primary btn-lg form-submit" id="submitBtn">Log In</button>
          </form>
          <div class="form-footer">Don't have an account? <a href="register.html">Sign up free</a></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom container" style="border-top:none;padding-top:1.5rem;">
      <span>© 2025 Nerdlandia</span>
      <span>Made with 🧠 and an unhealthy amount of caffeine</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => redirectIfLoggedIn());

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('formError');
      const btn = document.getElementById('submitBtn');
      err.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = 'Logging in…';

      const { error } = await signIn(email, password);
      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Log In';
        return;
      }

      window.location.href = 'profile.html';
    });
  </script>
</body>
</html>
