<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Nerdlandia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/profile.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺</text></svg>" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="../index.html" class="nav-logo">🗺 Nerdlandia</a>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Log in</a>
        <a href="register.html" class="btn btn-primary">Join the Hunt</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="section auth-section">
      <div class="container">

        <!-- Step 1: Request reset -->
        <div class="form-wrap" id="requestStep">
          <div class="form-emoji">🔑</div>
          <h1 class="form-title">Forgot your password?</h1>
          <p style="text-align:center;color:var(--text-muted);margin-bottom:1.5rem;font-size:0.95rem;">
            No worries. Enter your email and we'll send you a reset link.
          </p>
          <div id="requestError" class="form-msg error" style="display:none;"></div>
          <div id="requestSuccess" class="form-msg success" style="display:none;"></div>
          <form id="requestForm" novalidate>
            <div class="form-group">
              <label for="resetEmail">Email address</label>
              <input type="email" id="resetEmail" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <button type="submit" class="btn btn-primary btn-lg form-submit" id="requestBtn">
              Send Reset Link
            </button>
          </form>
          <div class="form-footer"><a href="login.html">← Back to login</a></div>
        </div>

        <!-- Step 2: Set new password (shown when ?type=recovery is in URL) -->
        <div class="form-wrap" id="resetStep" style="display:none;">
          <div class="form-emoji">🔐</div>
          <h1 class="form-title">Set a new password</h1>
          <div id="resetError" class="form-msg error" style="display:none;"></div>
          <div id="resetSuccess" class="form-msg success" style="display:none;"></div>
          <form id="resetForm" novalidate>
            <div class="form-group">
              <label for="newPassword">New password</label>
              <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password" required />
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm new password</label>
              <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" required />
            </div>
            <button type="submit" class="btn btn-primary btn-lg form-submit" id="resetBtn">
              Update Password
            </button>
          </form>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom container" style="border-top:none;padding-top:1.5rem;">
      <span>© 2025 Nerdlandia</span>
      <span>Made with 🧠 and an unhealthy amount of caffeine</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Supabase appends #access_token=...&type=recovery when user clicks the email link
      const hash = new URLSearchParams(window.location.hash.slice(1));
      if (hash.get('type') === 'recovery') {
        // Set the session from the URL tokens so we can call updateUser
        await sb.auth.setSession({
          access_token: hash.get('access_token'),
          refresh_token: hash.get('refresh_token'),
        });
        document.getElementById('requestStep').style.display = 'none';
        document.getElementById('resetStep').style.display = 'block';
      }
    });

    // ── Request reset link ──
    document.getElementById('requestForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('requestError');
      const okEl  = document.getElementById('requestSuccess');
      const btn   = document.getElementById('requestBtn');
      errEl.style.display = okEl.style.display = 'none';

      const email = document.getElementById('resetEmail').value.trim();
      if (!email) { errEl.textContent = 'Please enter your email.'; errEl.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = 'Sending…';

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/pages/forgot-password.html',
      });

      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Send Reset Link';
      } else {
        okEl.textContent = '✅ Check your email for a reset link. It may take a minute to arrive.';
        okEl.style.display = 'block';
        document.getElementById('requestForm').style.display = 'none';
      }
    });

    // ── Set new password ──
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('resetError');
      const okEl  = document.getElementById('resetSuccess');
      const btn   = document.getElementById('resetBtn');
      errEl.style.display = okEl.style.display = 'none';

      const pw  = document.getElementById('newPassword').value;
      const cpw = document.getElementById('confirmPassword').value;

      if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
      if (pw !== cpw)    { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = 'Updating…';

      const { error } = await sb.auth.updateUser({ password: pw });

      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Update Password';
      } else {
        okEl.textContent = '🎉 Password updated! Redirecting to your profile…';
        okEl.style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
