<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join the Hunt — Nerdlandia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺</text></svg>" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="../index.html" class="nav-logo">🗺 Nerdlandia</a>
      <ul class="nav-links">
        <li><a href="events.html">Events</a></li>
        <li><a href="teams.html">Teams</a></li>
        <li><a href="achievements.html">Achievements</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
      </ul>
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Log in</a>
      </div>
      <button class="nav-toggle" aria-label="Open menu" onclick="toggleNav()">☰</button>
    </nav>
    <div class="nav-mobile" id="navMobile">
      <a href="events.html">Events</a>
      <a href="login.html">Log in</a>
    </div>
  </header>

  <main>
    <section class="section auth-section">
      <div class="container">
        <div class="form-wrap">
          <div class="form-emoji">🎉</div>
          <h1 class="form-title">Join the Hunt!</h1>
          <div id="formError" class="form-msg error" style="display:none;"></div>
          <div id="formSuccess" class="form-msg success" style="display:none;"></div>
          <form id="registerForm" novalidate>
            <div class="form-group">
              <label for="username">Hunter name (username)</label>
              <input type="text" id="username" placeholder="CrypticNerd42" autocomplete="username" required />
              <span class="field-hint">Shown publicly on your profile and team page.</span>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="fname">First name</label>
                <input type="text" id="fname" placeholder="Alex" autocomplete="given-name" />
              </div>
              <div class="form-group">
                <label for="lname">Last name</label>
                <input type="text" id="lname" placeholder="Smith" autocomplete="family-name" />
              </div>
            </div>
            <div class="form-group">
              <label for="reg-email">Email address</label>
              <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" placeholder="At least 8 characters" autocomplete="new-password" required />
            </div>
            <div class="form-group">
              <label for="reg-confirm">Confirm password</label>
              <input type="password" id="reg-confirm" placeholder="••••••••" autocomplete="new-password" required />
            </div>
            <button type="submit" class="btn btn-primary btn-lg form-submit" id="submitBtn">Create Account →</button>
          </form>
          <div class="form-footer">Already have an account? <a href="login.html">Log in</a></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom container" style="border-top:none;padding-top:1.5rem;">
      <span>© 2025 Nerdlandia</span>
      <span>Made with 🧠 and an unhealthy amount of caffeine</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => redirectIfLoggedIn());

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('formError');
      const ok  = document.getElementById('formSuccess');
      const btn = document.getElementById('submitBtn');
      err.style.display = ok.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const fname    = document.getElementById('fname').value.trim();
      const lname    = document.getElementById('lname').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;

      if (!username)           return showErr('Please choose a hunter name.');
      if (!email)              return showErr('Please enter your email.');
      if (password.length < 8) return showErr('Password must be at least 8 characters.');
      if (password !== confirm) return showErr('Passwords do not match.');

      btn.disabled = true; btn.textContent = 'Creating account…';

      const { data, error } = await signUp(email, password);
      if (error) { showErr(error.message); btn.disabled = false; btn.textContent = 'Create Account →'; return; }

      if (data.user) {
        await updateProfile(data.user.id, {
          username,
          full_name: [fname, lname].filter(Boolean).join(' ') || null,
        });
      }

      ok.textContent = '🎉 Account created! Check your email to confirm, then log in.';
      ok.style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    });

    function showErr(msg) {
      const el = document.getElementById('formError');
      el.textContent = msg; el.style.display = 'block';
    }
  </script>
</body>
</html>
