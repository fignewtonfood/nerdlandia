<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Invite — Nerdlandia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺</text></svg>" />
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a href="../index.html" class="nav-logo">🗺 Nerdlandia</a>
      <div class="nav-actions">
        <a href="login.html" id="navLogin" class="btn btn-ghost">Log in</a>
        <a href="register.html" id="navJoin" class="btn btn-primary">Join the Hunt</a>
        <a href="profile.html" id="navProfile" class="btn btn-ghost" style="display:none;">My Profile</a>
        <button onclick="signOut()" id="navLogout" class="btn btn-ghost" style="display:none;">Log out</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="section" style="min-height:65vh;display:flex;align-items:center;">
      <div class="container" style="text-align:center;max-width:480px;">
        <div id="loadingState">
          <div style="font-size:3rem;margin-bottom:1rem;">✉️</div>
          <h1 style="font-family:var(--font-display);font-size:1.8rem;color:var(--purple);margin-bottom:0.5rem;">You've been invited!</h1>
          <p style="color:var(--text-muted);">Checking your invite…</p>
        </div>
        <div id="inviteState" style="display:none;">
          <div style="font-size:3rem;margin-bottom:1rem;">🎉</div>
          <h1 style="font-family:var(--font-display);font-size:1.8rem;color:var(--green);margin-bottom:0.5rem;">Join <span id="teamNameDisplay"></span>?</h1>
          <p style="color:var(--text-muted);margin-bottom:1.5rem;">You've been invited to join this team. Accept to become a member.</p>
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn btn-primary btn-lg" onclick="accept()">Accept Invite</button>
            <button class="btn btn-ghost btn-lg" onclick="decline()">Decline</button>
          </div>
        </div>
        <div id="errorState" style="display:none;">
          <div style="font-size:3rem;margin-bottom:1rem;">😬</div>
          <h1 style="font-family:var(--font-display);font-size:1.8rem;color:var(--coral);margin-bottom:0.5rem;">Invite issue</h1>
          <p id="errorMsg" style="color:var(--text-muted);margin-bottom:1.5rem;"></p>
          <a href="../index.html" class="btn btn-primary">Go to Homepage</a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/teams.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    let inviteData = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!token) { showError('No invite token found in the URL.'); return; }

      // Load invite info
      const { data: invite, error } = await sb
        .from('team_invites')
        .select('*, teams(name)')
        .eq('token', token)
        .eq('status', 'pending')
        .maybeSingle();

      if (error || !invite) { showError('This invite is invalid, expired, or already used.'); return; }

      inviteData = invite;
      document.getElementById('teamNameDisplay').textContent = invite.teams?.name || 'a team';
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('inviteState').style.display = 'block';
    });

    async function accept() {
      const user = await getUser();
      if (!user) {
        // Store token and redirect to login
        sessionStorage.setItem('pendingInviteToken', token);
        window.location.href = 'login.html';
        return;
      }
      const { teamId, error } = await acceptInvite(token);
      if (error) { showError(error.message); return; }
      window.location.href = 'team.html?id=' + teamId;
    }

    function decline() {
      sb.from('team_invites').update({ status: 'declined' }).eq('token', token).then(() => {
        window.location.href = '../index.html';
      });
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('inviteState').style.display = 'none';
      document.getElementById('errorMsg').textContent = msg;
      document.getElementById('errorState').style.display = 'block';
    }
  </script>
</body>
</html>
